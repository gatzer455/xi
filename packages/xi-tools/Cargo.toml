[package]
name = "xi-tools"
version = "0.3.2"
edition = "2021"
description = "Cross-platform native tools for pi coding agent (bash, grep, find, ls, read, write, edit)"

[[bin]]
name = "xi-tools"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
walkdir = "2"
regex = "1"
ignore = "0.4"
globset = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
xxhash-rust = { version = "0.8", features = ["xxh32"] }

# Cross-platform POSIX shell (embebido)
brush-core = { git = "https://github.com/reubeno/brush" }
brush-builtins = { git = "https://github.com/reubeno/brush" }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "process", "sync", "time"] }
futures = "0.3"

# Process containment: kill-on-drop for whole process trees
# - Windows: Job Object
# - Linux: cgroup v2 (fallback POSIX process group)
# - macOS/BSD: POSIX process group
# Disabled default features (stats) to keep binary size lean
processkit = { version = "1", default-features = false, features = ["process-control"] }