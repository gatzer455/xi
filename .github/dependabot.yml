# Mantiene actualizados los SHAs pineados de los actions en los
# workflows — sin esto, pinear por SHA congela versiones para siempre.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
  - package-ecosystem: bun
    directories:
      - /
      - /apps/desktop/frontend
      - /apps/mobile/frontend
      - /packages/xi-ui
      - /e2e
    schedule:
      interval: monthly
