name: Build Windows (manual)
on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/backend -> target

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        working-directory: apps/desktop/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/desktop/frontend
        run: npm run build

      - name: Build pi sidecar
        shell: bash
        run: ./scripts/build-pi.sh --target windows

      - name: Build pi-sessions sidecar
        shell: bash
        run: ./scripts/build-pi-sessions.sh --target windows

      - name: Build release (NSIS)
        env:
          TAURI_DIR: apps/desktop/backend
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles nsis --target x86_64-pc-windows-msvc

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: xi-windows-installer
          path: apps/desktop/backend/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
