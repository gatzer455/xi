name: Build Windows (manual)
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ./apps/desktop/backend -> target

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Install frontend deps
        working-directory: apps/desktop/frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/desktop/frontend
        run: bun run build

      - name: Build pi sidecar
        shell: bash
        run: node ./scripts/build-pi.mjs --target windows

      - name: Build pi-sessions sidecar
        shell: bash
        run: node ./scripts/build-pi-sessions.mjs --target windows

      - name: Build release (NSIS)
        env:
          TAURI_DIR: apps/desktop/backend
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx tauri build --bundles nsis --target x86_64-pc-windows-msvc

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: xi-windows-installer
          path: apps/desktop/backend/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
