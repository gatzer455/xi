name: CI

# Por qué: este workflow se dispara en cada PR y merge a main.
# Verifica que el código compile, pase tests unitarios, E2E, y
# formato/clippy. Es la primera línea de defensa antes de merge.
#
# Estructura de jobs:
#   1. lint-test — fmt + clippy + unit tests (setup compartido, clippy ya compila todo)
#   2. changes   — detecta qué archivos cambiaron (rápido, ~3s)
#   3. e2e       — WebdriverIO + tauri-driver (solo si cambió apps/desktop/frontend/ o e2e/)
#
# Optimizaciones:
#   - lint+test fusionados: el setup (system deps, pi, frontend) se hace una vez
#   - Pi binaries cacheados por hash de package.json (evita bun --compile en cada run)
#   - tauri-driver cacheado por runner OS (evita cargo install en cada run)
#   - E2E condicional: se salta si no hay cambios en apps/desktop/frontend/ o e2e/
#   - Job build eliminado: clippy --all-targets ya verifica que todo compila
#
# Tiempo total estimado:
#   - Cualquier PR (con cache): ~2-3 min
#   - Cold start:                 ~5-6 min (primer push de un PR nuevo)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Solo lectura: ningún job de CI escribe en el repo.
permissions:
  contents: read

# Cancelar runs anteriores del mismo PR. Si hacés 3 pushes
# rápidos, solo el último corre — evita desperdiciar CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Lint + Test: formato, clippy y tests unitarios.
  # Fusionados para que el setup (system deps, pi, frontend)
  # se ejecute una sola vez en vez de duplicarse.
  # ──────────────────────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            ./apps/desktop/backend -> target
            ./packages/xi-tools -> target

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Cache pi binaries
        id: cache-pi
        uses: actions/cache@v4
        with:
          path: apps/desktop/backend/binaries/
          key: pi-${{ hashFiles('node_modules/@earendil-works/pi-coding-agent/package.json', 'apps/desktop/backend/scripts/pi-sessions.ts') }}-${{ runner.os }}

      - name: Build pi sidecar
        if: steps.cache-pi.outputs.cache-hit != 'true'
        run: node ./scripts/build-pi.mjs --target linux

      - name: Build pi-sessions
        if: steps.cache-pi.outputs.cache-hit != 'true'
        run: node ./scripts/build-pi-sessions.mjs --target linux

      - name: Check xi-tools (compile check)
        run: cargo check --manifest-path packages/xi-tools/Cargo.toml

      - name: Install xi-ui deps
        run: cd packages/xi-ui && bun install --frozen-lockfile

      - name: Install frontend deps
        run: cd apps/desktop/frontend && bun install --frozen-lockfile

      - name: Install mobile frontend deps
        run: cd apps/mobile/frontend && bun install --frozen-lockfile

      - name: Build frontend
        run: cd apps/desktop/frontend && bun run build

      - name: Build mobile frontend
        run: cd apps/mobile/frontend && bun run build

      # ── Lint checks ──
      - name: TypeScript type-check
        run: cd apps/desktop/frontend && bun run typecheck

      - name: TypeScript type-check (mobile)
        run: cd apps/mobile/frontend && bun run typecheck

      - name: cargo fmt
        run: cargo fmt --all --manifest-path apps/desktop/backend/Cargo.toml -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --manifest-path apps/desktop/backend/Cargo.toml -- -D warnings

      # ── Unit tests ──
      - name: Frontend tests
        run: cd apps/desktop/frontend && bun run test:run

      - name: Mobile frontend tests
        run: cd apps/mobile/frontend && bun run test:run

      - name: Backend tests
        run: cd apps/desktop/backend && cargo test

  # ──────────────────────────────────────────────────────────────
  # Changes: detecta qué archivos cambiaron. Jobs downstream usan
  # esto para decidir si corren o se saltan (path filtering no se
  # puede hacer por job individual con on.pull_request.paths).
  # ──────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-22.04
    outputs:
      frontend_e2e: ${{ steps.filter.outputs.frontend_e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para comparar contra base
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            frontend_e2e:
              - 'apps/desktop/frontend/**'
              - 'e2e/**'

  # ──────────────────────────────────────────────────────────────
  # E2E: tests de integración completos. Requiere compilar el
  # debug build de Tauri + lanzar tauri-driver. Más lento pero
  # verifica que la app real funciona end-to-end.
  #
  # Solo corre si cambia apps/desktop/frontend/ o e2e/ — si un PR toca solo
  # apps/desktop/backend/ o docs, se salta (ahorra ~4-5 min por push).
  # ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    needs: changes
    if: ${{ needs.changes.outputs.frontend_e2e == 'true' }}
    # Nota: los tests básicos (app, welcome, settings) no requieren
    # pi con API keys. Solo sessions.spec.ts necesita pi-sessions
    # sidecar, que se compila en CI.
    # Si algún test falla, se reintenta 1 vez (config en wdio.conf.ts).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            ./apps/desktop/backend -> target
            ./packages/xi-tools -> target

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Install xi-ui deps
        run: cd packages/xi-ui && bun install --frozen-lockfile

      - name: Install frontend deps
        run: cd apps/desktop/frontend && bun install --frozen-lockfile

      - name: Install E2E deps
        run: cd e2e && bun install --frozen-lockfile

      - name: Cache pi binaries
        id: cache-pi
        uses: actions/cache@v4
        with:
          path: apps/desktop/backend/binaries/
          key: pi-${{ hashFiles('node_modules/@earendil-works/pi-coding-agent/package.json', 'apps/desktop/backend/scripts/pi-sessions.ts') }}-${{ runner.os }}

      - name: Build pi sidecar
        if: steps.cache-pi.outputs.cache-hit != 'true'
        run: node ./scripts/build-pi.mjs --target linux

      - name: Build pi-sessions
        if: steps.cache-pi.outputs.cache-hit != 'true'
        run: node ./scripts/build-pi-sessions.mjs --target linux

      - name: Build frontend (needed for Tauri dev mode)
        run: cd apps/desktop/frontend && bun run build

      - name: Cache tauri-driver
        id: cache-tauri-driver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}

      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: E2E tests
        env:
          # Software rendering para WebKitGTK headless en CI.
          # Sin esto, xvfb + WebKit falla con dmabuf errors en
          # runners de GitHub Ubuntu 22.04.
          WEBKIT_DISABLE_DMABUF_RENDERER: 1
        run: xvfb-run --auto-servernum bun run test:e2e
