name: Release

# Por qué: este workflow se dispara con push de tag `v*` (ej: v0.2.0).
# Construye xi para linux/Windows/macOS en una matriz, sube los
# instaladores + bundles del updater al release, y deja todo en
# estado `draft` para revisión manual del dev antes de publicar.
# Sin este workflow, tauri-app no puede auto-actualizarse.
#
# Secrets requeridos en GitHub repo settings:
#   - TAURI_SIGNING_PRIVATE_KEY: contenido completo de ~/.tauri/xi.key
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD: passphrase de la key
#   - GITHUB_TOKEN: provisto automáticamente por GitHub Actions
#
# El usuario que dispara el release:
#   git tag v0.2.0
#   git push --tags

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            pi-target: macos
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
            pi-target: macos-intel
          - platform: ubuntu-22.04
            args: --bundles deb
            rust-target: x86_64-unknown-linux-gnu
            pi-target: linux
          - platform: windows-latest
            args: ""
            rust-target: x86_64-pc-windows-msvc
            pi-target: windows
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            ./apps/desktop/backend -> target
            ./packages/xi-tools -> target

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup linuxdeploy (AppImage extract workaround)
        if: matrix.platform == 'ubuntu-22.04'
        run: echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Install xi-ui deps
        run: cd packages/xi-ui && bun install --frozen-lockfile

      - name: Install frontend deps
        run: cd apps/desktop/frontend && bun install --frozen-lockfile

      - name: Build pi sidecar
        shell: bash
        run: node ./scripts/build-pi.mjs --target ${{ matrix.pi-target }}

      - name: Build pi-sessions
        shell: bash
        run: node ./scripts/build-pi-sessions.mjs --target ${{ matrix.pi-target }}

      - name: Build xi-tools sidecar
        shell: bash
        run: node ./scripts/bundle-extensions.mjs --target ${{ matrix.rust-target }}

      - name: Tauri build + release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "xi v__VERSION__"
          releaseBody: "## Cambios\n\nVer commits desde el último release."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
