name: Release

# Por qué: este workflow se dispara con push de tag `v*` (ej: v0.2.0).
# Construye xi para linux/Windows/macOS en una matriz, sube los
# instaladores + bundles del updater al release, y deja todo en
# estado `draft` para revisión manual del dev antes de publicar.
# Sin este workflow, tauri-app no puede auto-actualizarse.
#
# Secrets requeridos en GitHub repo settings:
#   - TAURI_SIGNING_PRIVATE_KEY: contenido completo de ~/.tauri/xi.key
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD: passphrase de la key
#   - GITHUB_TOKEN: provisto automáticamente por GitHub Actions
#
# El usuario que dispara el release:
#   git tag v0.2.0
#   git push --tags

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            pi-target: macos
          - platform: ubuntu-22.04
            args: ""
            pi-target: linux
          - platform: windows-latest
            args: ""
            pi-target: windows
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend -> target

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build pi sidecar
        run: ./scripts/build-pi.sh --target ${{ matrix.pi-target }}

      - name: Build pi-sessions
        run: ./scripts/build-pi-sessions.sh --target ${{ matrix.pi-target }}

      - name: Tauri build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "xi v__VERSION__"
          releaseBody: "## Cambios\n\nVer commits desde el último release."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
